name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  windows:
    name: Windows x86 Release
    runs-on: windows-2022

    env:
      BUILD_TYPE: Release
      CMAKE_GENERATOR: NMake Makefiles
      CMAKE_BUILD_PARALLEL_LEVEL: 2
      CONAN_REVISIONS_ENABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set build version
        shell: pwsh
        run: |
          $tag = git describe --tags --always
          "REPO_TAG=$tag" >> $env:GITHUB_ENV
          "PACKAGE_NAME=discord-connector-$tag-win32" >> $env:GITHUB_ENV

      - name: Install build tools
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install "conan<2" "cmake<4"
          conan --version
          cmake --version

      - name: Configure
        shell: cmd
        run: |
          call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x86
          cmake -S . -B build ^
            -G "%CMAKE_GENERATOR%" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DDCC_VERSION="%REPO_TAG%"

      - name: Build
        shell: cmd
        run: |
          call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x86
          cmake --build build

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/artifact/plugins | Out-Null
          $plugin = Get-ChildItem -Path build -Recurse -Filter discord-connector.dll | Select-Object -First 1
          $logCore = Get-ChildItem -Path build -Recurse -Filter log-core2.dll | Select-Object -First 1
          if (-not $plugin) { throw "discord-connector.dll was not produced" }
          if (-not $logCore) { throw "log-core2.dll was not produced" }
          Copy-Item -LiteralPath $plugin.FullName -Destination build/artifact/plugins/discord-connector.dll -Force
          Copy-Item -LiteralPath $logCore.FullName -Destination build/artifact/log-core2.dll -Force
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build/artifact/* -DestinationPath "dist/$env:PACKAGE_NAME.zip" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: dist/${{ env.PACKAGE_NAME }}.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = "dist/$env:PACKAGE_NAME.zip"
          gh release view "$env:REPO_TAG" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:REPO_TAG" "$asset" --title "$env:REPO_TAG" --notes "Automated Windows x86 build."
          } else {
            gh release upload "$env:REPO_TAG" "$asset" --clobber
          }
