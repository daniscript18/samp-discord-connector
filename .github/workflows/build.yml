name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86 Release
            os: windows-2022
            platform: win32
          - name: Linux i386 Release
            os: ubuntu-22.04
            platform: linux-i386

    env:
      BUILD_TYPE: Release
      CMAKE_BUILD_PARALLEL_LEVEL: 2
      CONAN_REVISIONS_ENABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set build version
        shell: bash
        run: |
          tag="$(git describe --tags --always)"
          echo "REPO_TAG=$tag" >> "$GITHUB_ENV"
          echo "PACKAGE_NAME=discord-connector-$tag-${{ matrix.platform }}" >> "$GITHUB_ENV"

      - name: Install Python build tools
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "conan<2" "cmake<4"
          conan --version
          cmake --version

      - name: Install Linux multilib tools
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib g++-multilib zip

      - name: Configure Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x86
          cmake -S . -B build ^
            -G "NMake Makefiles" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DDCC_VERSION="%REPO_TAG%"

      - name: Configure Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cmake -S . -B build \
            -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-m32" \
            -DCMAKE_CXX_FLAGS="-m32" \
            -DCMAKE_EXE_LINKER_FLAGS="-m32" \
            -DCMAKE_SHARED_LINKER_FLAGS="-m32" \
            -DCMAKE_MODULE_LINKER_FLAGS="-m32" \
            -DDCC_VERSION="$REPO_TAG"

      - name: Build Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x86
          cmake --build build

      - name: Build Linux
        if: runner.os == 'Linux'
        shell: bash
        run: cmake --build build

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/artifact/plugins | Out-Null
          $plugin = Get-ChildItem -Path build -Recurse -Filter discord-connector.dll | Select-Object -First 1
          $logCore = Get-ChildItem -Path build -Recurse -Filter log-core2.dll | Select-Object -First 1
          if (-not $plugin) { throw "discord-connector.dll was not produced" }
          if (-not $logCore) { throw "log-core2.dll was not produced" }
          Copy-Item -LiteralPath $plugin.FullName -Destination build/artifact/plugins/discord-connector.dll -Force
          Copy-Item -LiteralPath $logCore.FullName -Destination build/artifact/log-core2.dll -Force
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build/artifact/* -DestinationPath "dist/$env:PACKAGE_NAME.zip" -Force

      - name: Package Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p build/artifact/plugins dist
          plugin="$(find build -name discord-connector.so -type f | head -n 1)"
          log_core="$(find build -name log-core2.so -type f | head -n 1)"
          test -n "$plugin" || { echo "discord-connector.so was not produced"; exit 1; }
          test -n "$log_core" || { echo "log-core2.so was not produced"; exit 1; }
          if [ "$plugin" != "build/artifact/plugins/discord-connector.so" ]; then
            cp "$plugin" build/artifact/plugins/discord-connector.so
          fi
          if [ "$log_core" != "build/artifact/log-core2.so" ]; then
            cp "$log_core" build/artifact/log-core2.so
          fi
          (cd build/artifact && zip -r "../../dist/$PACKAGE_NAME.zip" .)

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: dist/${{ env.PACKAGE_NAME }}.zip

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    needs: build

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        shell: bash
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" dist/*.zip --title "$GITHUB_REF_NAME" --notes "Automated release build."
          else
            gh release upload "$GITHUB_REF_NAME" dist/*.zip --clobber
          fi
