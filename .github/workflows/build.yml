name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  windows:
    name: Windows x86 Release
    runs-on: windows-2019

    env:
      BUILD_TYPE: Release
      CMAKE_GENERATOR: Visual Studio 16 2019
      CMAKE_BUILD_PARALLEL_LEVEL: 2
      CONAN_REVISIONS_ENABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set build version
        shell: pwsh
        run: |
          $tag = git describe --tags --always
          "REPO_TAG=$tag" >> $env:GITHUB_ENV
          "PACKAGE_NAME=discord-connector-$tag-win32" >> $env:GITHUB_ENV

      - name: Install build tools
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install "conan<2" "cmake<4"
          conan --version
          cmake --version

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "$env:CMAKE_GENERATOR" `
            -A Win32 `
            -DCMAKE_CONFIGURATION_TYPES=$env:BUILD_TYPE `
            -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE `
            -DDCC_VERSION="$env:REPO_TAG"

      - name: Build
        shell: pwsh
        run: cmake --build build --config $env:BUILD_TYPE -- /m /verbosity:minimal

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build/artifact/* -DestinationPath "dist/$env:PACKAGE_NAME.zip" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: dist/${{ env.PACKAGE_NAME }}.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = "dist/$env:PACKAGE_NAME.zip"
          gh release view "$env:REPO_TAG" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:REPO_TAG" "$asset" --title "$env:REPO_TAG" --notes "Automated Windows x86 build."
          } else {
            gh release upload "$env:REPO_TAG" "$asset" --clobber
          }
